<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'" />
    <title>S.A.R.A.H.</title>
    <style>
      @font-face {
        font-family: "Dancing Script";
        src: url("assets/fonts/DancingScript-Regular.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: block;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #0a0a1a;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
      }

      /* Three.js orb container — full background */
      #orb {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      /* Text overlay */
      #splash-container {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
        pointer-events: none;
      }

      #splash-title {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 4rem;
        font-weight: 300;
        letter-spacing: 0.3em;
        color: #e8e8f0;
        opacity: 0;
        transition: opacity 0.5s ease-in;
      }

      #splash-subtitle {
        font-family: "Dancing Script", cursive;
        font-size: 1.5rem;
        color: #a0a0b8;
        margin-top: 0.5rem;
        margin-left: -1.5rem;
        opacity: 0;
        transition: opacity 0.5s ease-in;
      }

      #splash-title.visible,
      #splash-subtitle.visible {
        opacity: 1;
      }

    /* Boot status message — bottom left */
    #boot-status {
      position: absolute;
      bottom: 24px;
      left: 28px;
      z-index: 30;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 0.75rem;
      color: #a0a0b8;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    #boot-status.visible {
      opacity: 1;
    }

    /* Smooth loading dots animation */
    .loading-dots span {
      opacity: 0;
      animation: dot-fade 1.4s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-fade {
      0%, 20% { opacity: 0; }
      40% { opacity: 1; }
      60%, 100% { opacity: 0; }
    }

    /* Chat bubble — positioned above orb center */
    #splash-bubble {
      position: absolute;
      top: 35%;
      left: calc(50% - 150px);
      transform: translateX(-50%);
      z-index: 30;
      max-width: 85%;
      padding: 12px 24px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      color: #e8e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 1.275rem;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    #splash-bubble.visible {
      opacity: 1;
    }

      /* 2D particle/streak overlay */
      #splash-canvas {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        z-index: 20;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="orb"></div>
    <div id="splash-container">
      <div id="splash-title">S.A.R.A.H.</div>
      <div id="splash-subtitle">Smart Assistant for Resource and Administration Handling</div>
    </div>
    <canvas id="splash-canvas"></canvas>
    <div id="boot-status"></div>
    <div id="splash-bubble"></div>
    <script src="dist/splash.js"></script>
  </body>
</html>
