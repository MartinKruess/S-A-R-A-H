<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'" />
    <title>S.A.R.A.H.</title>
    <style>
      @font-face {
        font-family: "Dancing Script";
        src: url("assets/fonts/DancingScript-Regular.woff2") format("woff2");
        font-weight: 400;
        font-style: normal;
        font-display: block;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #0a0a1a;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
      }

      #splash-container {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
      }

      #splash-title {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 4rem;
        font-weight: 300;
        letter-spacing: 0.3em;
        color: #e8e8f0;
        opacity: 0;
        transition: opacity 0.5s ease-in;
      }

      #splash-subtitle {
        font-family: "Dancing Script", cursive;
        font-size: 1.15rem;
        color: #a0a0b8;
        margin-top: 0.5rem;
        opacity: 0;
        transition: opacity 0.5s ease-in;
      }

      #splash-title.visible,
      #splash-subtitle.visible {
        opacity: 1;
      }

      #splash-canvas {
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 100%;
        z-index: 20;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="splash-container">
      <div id="splash-title">S.A.R.A.H.</div>
      <div id="splash-subtitle">Smart Assistant for Resource and Administration Handling</div>
    </div>
    <canvas id="splash-canvas"></canvas>
    <script src="dist/splash.js"></script>
  </body>
</html>
